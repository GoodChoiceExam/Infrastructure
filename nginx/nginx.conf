events {
  worker_connections 1024;
}

http {
  server {
    listen 80;
    server_name localhost;

    # Identity
    location /auth/ {
      proxy_pass http://identity:8080/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /.well-known/ {
      proxy_pass http://identity:8080/.well-known/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /identity/healthz {
      proxy_pass http://identity:8080/healthz;
      proxy_set_header Host $host;
    }

    # Classes
    location /api/classes/ {
      proxy_pass http://classes:8080/api/classes/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # Frontend (Blazor WASM static files) — skal være sidst
    location / {
      proxy_pass http://frontend:80/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
