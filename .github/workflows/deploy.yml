name: Deploy to Server

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Log ind på DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull newest images
        run: docker compose pull

      - name: Restart containers
        env:
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          IDENTITY_MONGO_PASSWORD: ${{ secrets.IDENTITY_MONGO_PASSWORD }}
          LIVESTREAM_MONGO_PASSWORD: ${{ secrets.LIVESTREAM_MONGO_PASSWORD }}
          CLASSES_MONGO_PASSWORD: ${{ secrets.CLASSES_MONGO_PASSWORD }}
          TRAINER_MONGO_PASSWORD: ${{ secrets.TRAINER_MONGO_PASSWORD }}
          TRAININGLOG_MONGO_PASSWORD: ${{ secrets.TRAININGLOG_MONGO_PASSWORD }}
          MEMBERSHIP_MONGO_PASSWORD: ${{ secrets.MEMBERSHIP_MONGO_PASSWORD }}
          COMMUNITY_MONGO_PASSWORD: ${{ secrets.COMMUNITY_MONGO_PASSWORD }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          IDENTITY_JWT_RSA_PRIVATE_KEY: ${{ secrets.IDENTITY_JWT_RSA_PRIVATE_KEY }}
        run: docker compose up -d --remove-orphans --force-recreate

      - name: Unseal Vault
        shell: powershell
        run: |
          docker exec fitlife_vault vault operator unseal -address=http://localhost:8200 ${{ secrets.VAULT_UNSEAL_KEY_1 }}
          docker exec fitlife_vault vault operator unseal -address=http://localhost:8200 ${{ secrets.VAULT_UNSEAL_KEY_2 }}
          docker exec fitlife_vault vault operator unseal -address=http://localhost:8200 ${{ secrets.VAULT_UNSEAL_KEY_3 }}
