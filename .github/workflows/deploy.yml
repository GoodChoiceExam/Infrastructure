name: Deploy to Server

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Pull newest images
        run: docker compose pull

      - name: Restart containers
        run: docker compose --env-file .env up -d --remove-orphans
