services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fitlife_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: fitlife_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    restart: unless-stopped

  vault:
    image: hashicorp/vault:latest
    container_name: fitlife_vault
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    user: root
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
    entrypoint: ["/bin/sh", "-c", "mkdir -p /vault/config && echo '{\"storage\":{\"file\":{\"path\":\"/vault/data\"}},\"listener\":{\"tcp\":{\"address\":\"0.0.0.0:8200\",\"tls_disable\":true}},\"ui\":true}' > /vault/config/local.json && vault server -config=/vault/config/local.json"]
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: fitlife_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fitlife_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/fitlife-overview.json
      - GF_SERVER_ROOT_URL=https://goodchoice.cc/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    restart: unless-stopped

  identity:
    image: goodchoicecc/fitlife-identity:latest
    container_name: fitlife_identity
    expose:
      - "8080"
    environment:
      - MongoDB__ConnectionString=mongodb://identity_user:${IDENTITY_MONGO_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=fitlife-identity
      - Jwt__Issuer=fitlife-identity
      - Jwt__Audience=fitlife
      - Jwt__ExpiryMinutes=60
      - Jwt__KeyId=fitlife-key-1
      - Jwt__RsaPrivateKey=${IDENTITY_JWT_RSA_PRIVATE_KEY}
      - Jwt__JwksUrl=http://identity:8080/.well-known/jwks.json
      - LOKI_ENDPOINT=http://loki:3100
    depends_on:
      - mongodb
    restart: unless-stopped

  livestream:
    image: goodchoicecc/fitlife-livestream:latest
    container_name: fitlife_livestream
    expose:
      - "8080"
    environment:
      - MongoDB__ConnectionString=mongodb://livestream_user:${LIVESTREAM_MONGO_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=fitlife_livestream
      - MongoDB__CollectionName=livestreams
      - Jwt__Issuer=fitlife-identity
      - Jwt__Audience=fitlife
      - Jwt__JwksUrl=http://identity:8080/.well-known/jwks.json
      - LOKI_ENDPOINT=http://loki:3100
    depends_on:
      - mongodb
      - identity
    restart: unless-stopped

  classes:
    image: goodchoicecc/fitlife-classes:latest
    container_name: fitlife_classes
    expose:
      - "8080"
    environment:
      - MongoDB__ConnectionString=mongodb://classes_user:${CLASSES_MONGO_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=fitlife-classes
      - MongoDB__CollectionName=trainingClasses
      - Jwt__Issuer=fitlife-identity
      - Jwt__Audience=fitlife
      - Jwt__JwksUrl=http://identity:8080/.well-known/jwks.json
      - LOKI_ENDPOINT=http://loki:3100
    depends_on:
      - mongodb
      - identity
    restart: unless-stopped

  trainer:
    image: goodchoicecc/fitlife-trainer:latest
    container_name: fitlife_trainer
    expose:
      - "8080"
    environment:
      - MongoDB__ConnectionString=mongodb://trainer_user:${TRAINER_MONGO_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=fitlife_trainer
      - MongoDB__CollectionName=trainers
      - Jwt__Issuer=fitlife-identity
      - Jwt__Audience=fitlife
      - Jwt__JwksUrl=http://identity:8080/.well-known/jwks.json
      - LOKI_ENDPOINT=http://loki:3100
    depends_on:
      - mongodb
      - identity
    restart: unless-stopped

  traininglog:
    image: goodchoicecc/fitlife-traininglog:latest
    container_name: fitlife_traininglog
    expose:
      - "8080"
    environment:
      - MongoDB__ConnectionString=mongodb://traininglog_user:${TRAININGLOG_MONGO_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=fitlife-traininglog
      - Jwt__JwksUrl=http://identity:8080/.well-known/jwks.json
      - Jwt__Audience=fitlife
      - LOKI_ENDPOINT=http://loki:3100
    depends_on:
      - mongodb
      - identity
    restart: unless-stopped

  membership:
    image: goodchoicecc/fitlife-membership:latest
    container_name: fitlife_membership
    expose:
      - "8080"
    environment:
      - MongoDB__ConnectionString=mongodb://membership_user:${MEMBERSHIP_MONGO_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=fitlife-membership
      - Jwt__JwksUrl=http://identity:8080/.well-known/jwks.json
      - Jwt__Audience=fitlife
      - LOKI_ENDPOINT=http://loki:3100
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
    depends_on:
      - mongodb
      - identity
    restart: unless-stopped

  community:
    image: goodchoicecc/fitlife-community:latest
    container_name: fitlife_community
    expose:
      - "8080"
    environment:
      - MongoDB__ConnectionString=mongodb://community_user:${COMMUNITY_MONGO_PASSWORD}@mongodb:27017
      - MongoDB__DatabaseName=fitlife-community
      - MongoDB__CommunitiesCollectionName=communities
      - MongoDB__PostsCollectionName=communityPosts
      - Jwt__Issuer=fitlife-identity
      - Jwt__Audience=fitlife
      - Jwt__JwksUrl=http://identity:8080/.well-known/jwks.json
      - LOKI_ENDPOINT=http://loki:3100
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
    depends_on:
      - mongodb
      - identity
    restart: unless-stopped

  frontend:
    image: goodchoicecc/fitlife-frontend:latest
    container_name: fitlife_frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fitlife_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - identity
      - livestream
    restart: unless-stopped

volumes:
  rabbitmq_data:
  mongodb_data:
  vault_data:
  loki_data:
  grafana_data:
